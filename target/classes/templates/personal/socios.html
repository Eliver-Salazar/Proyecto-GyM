<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout/plantilla :: head}"></head>

<body>
<header th:replace="~{layout/plantilla :: header}"></header>

<section class="py-5 bg-light border-bottom" sec:authorize="hasAnyRole('ADMIN','PERSONAL')">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div>
                <h1 class="display-6 fw-bold mb-1">Socios registrados</h1>
                <p class="text-muted mb-0">
                    Consulta básica de usuarios visibles para el panel del personal.
                </p>
            </div>
            <a th:href="@{/personal/panel}" class="btn btn-outline-secondary" sec:authorize="hasAnyRole('ADMIN','PERSONAL')">
                <i class="fas fa-arrow-left me-1"></i> Volver al panel
            </a>
        </div>
    </div>
</section>

<main class="container py-5" sec:authorize="hasAnyRole('ADMIN','PERSONAL')">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">Listado de socios</h5>
        </div>

        <div class="card-body" th:if="${socios != null and !#lists.isEmpty(socios)}">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>Nombre completo</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Cédula</th>
                        <th>Rol</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${socios}">
                        <td th:text="${u.idUsuario}">1</td>
                        <td th:text="${(u.nombre != null ? u.nombre : '') + ' ' + (u.apellido != null ? u.apellido : '')}">
                            Nombre Apellido
                        </td>
                        <td th:text="${u.correo}">correo@ejemplo.com</td>
                        <td th:text="${u.telefono != null and !#strings.isEmpty(u.telefono) ? u.telefono : 'No registrado'}">
                            No registrado
                        </td>
                        <td th:text="${u.cedula != null and !#strings.isEmpty(u.cedula) ? u.cedula : 'No registrada'}">
                            No registrada
                        </td>
                        <td>
                            <span class="badge bg-secondary"
                                  th:text="${u.rol != null ? u.rol.nombre : 'SIN ROL'}">
                                SIN ROL
                            </span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-body" th:if="${socios == null or #lists.isEmpty(socios)}">
            <div class="alert alert-secondary mb-0">
                No hay socios registrados para mostrar.
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
