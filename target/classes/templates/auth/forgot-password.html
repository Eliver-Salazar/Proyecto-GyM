<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout/plantilla :: head}"></head>

<body>
<header th:replace="~{layout/plantilla :: header}"></header>

<section class="py-5 bg-light border-bottom">
    <div class="container text-center">
        <h1 class="display-6 fw-bold mb-2">Recuperar contraseña</h1>
        <p class="text-muted mb-0">
            Ingresa tu correo para procesar la solicitud.
        </p>
    </div>
</section>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">Formulario de recuperación</h5>
                </div>
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger mb-3">
                        <span th:text="${error}">Debes ingresar un correo.</span>
                    </div>

                    <div th:if="${mensaje}" class="alert alert-info mb-3">
                        <span th:text="${mensaje}">Se procesará la solicitud.</span>
                    </div>

                    <p class="text-muted">
                        Si el correo existe en el sistema, se mostrará un mensaje de confirmación.
                    </p>

                    <form th:action="@{/forgot-password}" method="post">
                        <div class="mb-3">
                            <label for="correo" class="form-label fw-semibold">Correo electrónico</label>
                            <input id="correo"
                                   class="form-control"
                                   type="email"
                                   name="correo"
                                   placeholder="correo@ejemplo.com"
                                   required>
                        </div>

                        <div class="d-flex gap-2">
                            <a th:href="@{/login}" class="btn btn-outline-secondary">Volver</a>
                            <button class="btn btn-warning text-dark" type="submit">Enviar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
