<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout/plantilla :: head}"></head>

<body>
<header th:replace="~{layout/plantilla :: header}"></header>

<section class="py-5 bg-light border-bottom">
    <div class="container text-center">
        <h1 class="display-6 fw-bold mb-2">Horarios</h1>
        <p class="text-muted mb-0">
            Consulta los horarios generales de atención del gimnasio.
        </p>
    </div>
</section>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0">Horario de atención</h4>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-striped align-middle">
                            <thead class="table-dark">
                            <tr>
                                <th>Día</th>
                                <th>Horario</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td>Lunes a viernes</td>
                                <td>5:00 a.m. - 9:00 p.m.</td>
                            </tr>
                            <tr>
                                <td>Sábados</td>
                                <td>7:00 a.m. - 5:00 p.m.</td>
                            </tr>
                            <tr>
                                <td>Domingos</td>
                                <td>8:00 a.m. - 1:00 p.m.</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <p class="text-muted mb-0">
                        Los horarios pueden variar según la sucursal y disponibilidad operativa.
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
