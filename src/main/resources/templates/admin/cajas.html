<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/plantilla :: head}"></head>

<body>
<header th:replace="~{layout/plantilla :: header}"></header>

<section class="py-5 bg-light border-bottom">
    <div class="container">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3">
            <div>
                <h1 class="display-6 fw-bold mb-2">Cajas</h1>
                <p class="text-muted mb-0">
                    Administración de puntos de cobro por sucursal.
                </p>
            </div>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>Volver al panel
            </a>
        </div>
    </div>
</section>

<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card shadow border-0">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0"
                        th:text="${modoEdicionCaja ? 'Editar caja' : 'Registrar caja'}">
                        Registrar caja
                    </h4>
                </div>

                <div class="card-body">
                    <form th:action="@{/admin/cajas/guardar}" th:object="${cajaForm}" method="post">
                        <input type="hidden" th:field="*{idCaja}"/>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Sucursal</label>
                            <select class="form-select" th:field="*{sucursal.idSucursal}" required>
                                <option value="">Seleccione una sucursal</option>
                                <option th:each="s : ${sucursalesDisponibles}"
                                        th:value="${s.idSucursal}"
                                        th:text="${s.nombre}">
                                    Sucursal
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Nombre de la caja</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{nombre}"
                                   required
                                   maxlength="40"
                                   pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ0-9 ]+"
                                   title="Solo se permiten letras, números y espacios."
                                   placeholder="CAJA PRINCIPAL">
                            <div class="form-text">
                                Solo letras, números y espacios. El nombre no puede repetirse dentro de la misma sucursal.
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-warning text-white">
                                <i class="fas fa-save me-2"></i>
                                <span th:text="${modoEdicionCaja ? 'Actualizar caja' : 'Guardar caja'}">
                                    Guardar caja
                                </span>
                            </button>

                            <a th:if="${modoEdicionCaja}"
                               th:href="@{/admin/cajas}"
                               class="btn btn-outline-secondary">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card shadow border-0">
                <div class="card-header bg-dark text-white">
                    <h4 class="mb-0">Cajas registradas</h4>
                </div>

                <div class="card-body p-0"
                     th:if="${cajasListado != null and !#lists.isEmpty(cajasListado)}">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Sucursal</th>
                                <th>Nombre</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="c : ${cajasListado}">
                                <td th:text="${c.idCaja}">1</td>
                                <td th:text="${c.sucursal != null ? c.sucursal.nombre : 'Sin sucursal'}">
                                    Sucursal
                                </td>
                                <td>
                                    <span class="badge bg-secondary fs-6"
                                          th:text="${c.nombre}">
                                        CAJA PRINCIPAL
                                    </span>
                                </td>
                                <td class="text-center">
                                    <div class="d-flex justify-content-center gap-2">
                                        <a th:href="@{/admin/cajas/editar/{id}(id=${c.idCaja})}"
                                           class="btn btn-sm btn-outline-primary"
                                           title="Editar">
                                            <i class="fas fa-pen"></i>
                                        </a>

                                        <form th:action="@{/admin/cajas/eliminar/{id}(id=${c.idCaja})}"
                                              method="post"
                                              onsubmit="return confirm('¿Deseas eliminar esta caja?');">
                                            <button type="submit"
                                                    class="btn btn-sm btn-outline-danger"
                                                    title="Eliminar">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="card-body"
                     th:if="${cajasListado == null or #lists.isEmpty(cajasListado)}">
                    <div class="alert alert-secondary mb-0">
                        No hay cajas registradas todavía.
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
