<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout/plantilla :: head}"></head>

<body>
<header th:replace="~{layout/plantilla :: header}"></header>

<section class="py-5 bg-light border-bottom">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div>
                <h1 class="display-6 fw-bold mb-1">Administración de usuarios</h1>
                <p class="text-muted mb-0">
                    Consulta de usuarios registrados en el sistema Warrior Gym.
                </p>
            </div>
            <a th:href="@{/admin}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i> Volver al panel
            </a>
        </div>
    </div>
</section>

<main class="container py-5">
    <div class="card shadow border-0">
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0">Listado de usuarios</h5>
        </div>

        <div class="card-body" th:if="${usuarios != null and !#lists.isEmpty(usuarios)}">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre completo</th>
                        <th>Correo</th>
                        <th>Teléfono</th>
                        <th>Cédula</th>
                        <th>Rol</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.idUsuario}">1</td>
                        <td th:text="${(u.nombre != null ? u.nombre : '') + ' ' + (u.apellido != null ? u.apellido : '')}">
                            Nombre Apellido
                        </td>
                        <td th:text="${u.correo}">correo@ejemplo.com</td>
                        <td th:text="${u.telefono != null and !#strings.isEmpty(u.telefono) ? u.telefono : 'No registrado'}">
                            No registrado
                        </td>
                        <td th:text="${u.cedula != null and !#strings.isEmpty(u.cedula) ? u.cedula : 'No registrada'}">
                            No registrada
                        </td>
                        <td>
                            <span class="badge bg-secondary"
                                  th:text="${u.rol != null ? u.rol.nombre : 'SIN ROL'}">
                                SIN ROL
                            </span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card-body" th:if="${usuarios == null or #lists.isEmpty(usuarios)}">
            <div class="alert alert-secondary mb-0">
                No hay usuarios registrados para mostrar.
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
