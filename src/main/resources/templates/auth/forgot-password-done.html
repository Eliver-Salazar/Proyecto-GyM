<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout/plantilla :: head}"></head>

<body>
<header th:replace="~{layout/plantilla :: header}"></header>

<section class="py-5 bg-light border-bottom">
    <div class="container text-center">
        <h1 class="display-6 fw-bold mb-2">Solicitud procesada</h1>
        <p class="text-muted mb-0">
            Revisa tu correo si existe una cuenta asociada.
        </p>
    </div>
</section>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow border-0">
                <div class="card-body">
                    <div class="alert alert-info mb-3">
                        Si el correo proporcionado está registrado, se procesará la recuperación de contraseña.
                    </div>
                    <a th:href="@{/login}" class="btn btn-warning text-dark">
                        Volver a iniciar sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
