<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/plantilla :: head}"></head>

<body>
<header th:replace="~{layout/plantilla :: header}"></header>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow border-0">
                <div class="card-body text-center p-5">
                    <div class="mb-4">
                        <i class="fas fa-lock text-warning" style="font-size: 4rem;"></i>
                    </div>

                    <h1 class="fw-bold mb-3">Acceso denegado</h1>

                    <p class="text-muted mb-4">
                        No tienes permisos para acceder a esta sección del sistema.
                    </p>

                    <div class="d-flex flex-column flex-sm-row justify-content-center gap-2">
                        <a th:href="@{/}" class="btn btn-outline-secondary">
                            <i class="fas fa-house me-2"></i>Ir al inicio
                        </a>

                        <a th:href="@{/perfil}" class="btn btn-warning text-white" sec:authorize="isAuthenticated()">
                            <i class="fas fa-user me-2"></i>Ir a mi perfil
                        </a>

                        <a th:href="@{/login}" class="btn btn-warning text-white" sec:authorize="isAnonymous()">
                            <i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
