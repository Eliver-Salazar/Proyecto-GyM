<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{layout/plantilla :: head}"></head>

<body>
<header th:replace="~{layout/plantilla :: header}"></header>

<section class="py-5 bg-light border-bottom">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div>
                <h1 class="display-6 fw-bold mb-1">Turnos del personal</h1>
                <p class="text-muted mb-0">
                    Vista temporal mientras se completa el módulo operativo.
                </p>
            </div>
            <a th:href="@{/personal/panel}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-1"></i> Volver al panel
            </a>
        </div>
    </div>
</section>

<main class="container py-5">
    <div class="card shadow border-0">
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0">Estado del módulo</h5>
        </div>
        <div class="card-body">
            <div class="alert alert-secondary mb-0">
                El módulo de turnos aún se encuentra en desarrollo.  
                Por ahora esta vista se mantiene estable para evitar rutas rotas y dejar la navegación funcional.
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{layout/plantilla :: footer}"></footer>
</body>
</html>
